# LEGACY STANDALONE COMPOSE — DO NOT USE FOR PRODUCTION
#
# This file is for local debugging of al-amanah (tasks) by itself only.
# Production deployment is managed from the cmuqmsa-infra repository
# (https://github.com/CMUQ-MSA/cmuqmsa-infra).
#
# Do not run this on the server unless you are intentionally debugging
# this app in isolation. It publishes host ports (for example 127.0.0.1:8080)
# and can conflict with the unified infra stack (Caddy + Cloudflare Tunnel).
#
# See cmuqmsa-infra/docs/runbook.md for the supported deployment flow.

services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run test:run"
    profiles:
      - test

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

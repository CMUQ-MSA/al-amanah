# Alembic config for Al-Amanah backend
# DB URL is overridden in env.py from app config (.env)

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# Placeholder - env.py overrides with DATABASE_URL from .env
sqlalchemy.url = sqlite:///./data/msa_tracker.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
